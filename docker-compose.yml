version: '3.8'

services:
  # API сервис на NestJS
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lab-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - lab-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web сервис на React + Vite (обслуживается nginx)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lab-web
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge

