version: '3.8'

services:
  # API сервис на NestJS
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lab-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - lab-network

  # Web сервис на React + Vite (обслуживается nginx)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lab-web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge

